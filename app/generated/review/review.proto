syntax = "proto3";

package review;

import "google/protobuf/timestamp.proto";

// The Review Service definition
service ReviewService {
  // ➤ Create Review
  rpc CreateReview (CreateReviewRequest) returns (Review);

  // ➤ Get Reviews by Product (with pagination)
  rpc GetReviewsByProduct (GetReviewsRequest) returns (GetReviewsResponse);

  // ➤ Get Average Rating
  rpc GetAverageRating (GetAverageRatingRequest) returns (AverageRatingResponse);

  // ➤ Update Review
  rpc UpdateReview (UpdateReviewRequest) returns (Review);

  // ➤ Delete Review
  rpc DeleteReview (DeleteReviewRequest) returns (DeleteReviewResponse);
}

// --- Message Definitions ---

message Review {
  string id = 1;
  string product_id = 2;
  string user_id = 3;
  int32 rating = 4;
  string comment = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateReviewRequest {
  string product_id = 1;
  string user_id = 2;
  int32 rating = 3;
  string comment = 4;
}

message GetReviewsRequest {
  string product_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message GetReviewsResponse {
  repeated Review reviews = 1;
}

message GetAverageRatingRequest {
  string product_id = 1;
}

message AverageRatingResponse {
  string product_id = 1;
  float avg_rating = 2;
  int32 total_reviews = 3;
}

message UpdateReviewRequest {
  string id = 1;
  string user_id = 2; // Required because your code checks { _id: id, userId: req.user.id }
  int32 rating = 3;
  string comment = 4;
}

message DeleteReviewRequest {
  string id = 1;
  string user_id = 2; // Required because your code checks { _id: id, userId: req.user.id }
}

message DeleteReviewResponse {
  string message = 1;
}

