syntax = "proto3";

package app.generated.shop;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

service ShopService {
  rpc CreateShop(ShopCreate) returns (Shop);
  rpc GetShop(ShopID) returns (Shop);
  rpc GetAllShops(VoidNoParam) returns (Shops);
  rpc UpdateShop(ShopUpdate) returns (Shop);
  rpc DeleteShop(ShopID) returns (VoidNoParam);
}

message Shop {
  string id = 1;
  string name = 2;
  string description = 3;
  string location = 4;
  string email = 5;
  string phone = 6;
  string owner_id = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message ShopCreate {
  string name = 1;
  string description = 2;
  string location = 3;
  string owner_id = 4;
  string email = 5;
  string phone = 6;
}

message ShopID {
  string id = 1;
}

message VoidNoParam {}

message Shops {
  repeated Shop shops = 1;
}

message ShopUpdate {
  string id = 1;

  google.protobuf.StringValue name = 2;
  google.protobuf.StringValue description = 3;
  google.protobuf.StringValue location = 4;
  google.protobuf.StringValue email = 5;
  google.protobuf.StringValue phone = 6;
}