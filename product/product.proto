syntax = "proto3";

package app.generated.products;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service ProductService {
  rpc CreateProduct (ProductCreateRequest) returns (ProductResponse);
  rpc GetProduct (ProductIdRequest) returns (ProductResponse);
  rpc GetAllProducts (google.protobuf.Empty) returns (ProductListResponse);
  rpc UpdateProduct (ProductUpdateRequest) returns (ProductUpdateResponse);
  rpc DeleteProduct (ProductIdRequest) returns (DeleteResponse);
}

message ProductCreateRequest {
  optional string seller_id = 1;
  string product_name = 2;
  optional string product_description = 3;
  int32 product_price = 4;
  optional bool product_sold = 5;
}

message ProductResponse {
  string id = 1;
  optional string seller_id = 2;
  string product_name = 3;
  optional string product_description = 4;
  int32 product_price = 5;
  bool product_sold = 6;
  google.protobuf.Timestamp product_date = 7;
}

message ProductIdRequest {
  string product_id = 1;
}

message ProductListResponse {
  repeated ProductResponse products = 1;
}

message ProductUpdateRequest {
  string product_id = 1;
  optional string product_name = 2;
  optional string product_description = 3;
  optional int32 product_price = 4;
  optional bool product_sold = 5;
}

message ProductUpdateResponse {
  ProductResponse product = 1;
  string message = 2;
}

message DeleteResponse {
  string message = 1;
}